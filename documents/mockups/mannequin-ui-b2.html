<title>마네킹 UI — 최종 흐름안</title>
<style>
  :root{
    --bg:#F4F7FA; --surface:#FFF; --ink:#16222E; --muted:#5C6E7D; --faint:#93A3B1;
    --line:#E0E7EE; --accent:#0B84DC; --accent-deep:#0960A6; --accent-soft:#E6F3FD;
    --ok:#1C7A3E; --ok-soft:#E7F5EC;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Apple SD Gothic Neo',Pretendard,'Noto Sans KR',system-ui,sans-serif;line-height:1.56;-webkit-font-smoothing:antialiased}
  .wrap{max-width:980px;margin:0 auto;padding:34px 20px 90px}
  header h1{font-size:21px;font-weight:800;letter-spacing:-.02em;margin:0 0 4px}
  header p{margin:0 0 18px;color:var(--muted);font-size:13px}

  .stage{display:grid;grid-template-columns:.85fr 1.15fr;gap:20px;align-items:start}
  @media(max-width:820px){.stage{grid-template-columns:1fr}}

  .mine{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 8px 24px rgba(24,60,90,.07);position:sticky;top:16px}
  .mine .tag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;color:var(--accent-deep);background:var(--accent-soft);border:1px solid #C6E4FA;border-radius:999px;padding:3px 10px;margin-bottom:9px}
  .mine-img{border-radius:12px;overflow:hidden;border:2px solid var(--accent);background:#EEF2F6}
  .mine-img img{display:block;width:100%}
  .refrow{display:flex;gap:7px;align-items:center;margin-top:10px;font-size:11px;color:var(--muted);border-top:1px dashed var(--line);padding-top:10px}
  .refrow img{width:30px;height:30px;object-fit:cover;border-radius:6px;border:1px solid var(--line)}

  .flow{display:flex;flex-direction:column;gap:10px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:0 6px 18px rgba(24,60,90,.05);transition:opacity .15s}
  .card.future{opacity:.45}
  .card.active{border-color:var(--accent);box-shadow:0 8px 22px rgba(11,132,220,.1)}
  .card .hd{display:flex;align-items:center;gap:9px}
  .card .num{width:23px;height:23px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;background:#EEF2F6;color:var(--faint)}
  .card.done .num{background:var(--ok-soft);color:var(--ok)}
  .card .ttl{font-size:14.5px;font-weight:800;flex:1}
  .card .st{font-size:12px;color:var(--muted)} .card .st b{color:var(--accent-deep)}
  .editbtn{border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:5px 12px;font-size:11.5px;font-weight:800;color:var(--muted);cursor:pointer}
  .editbtn:hover{border-color:#A9C6DC;color:var(--ink)}

  .card .q{font-size:13px;color:var(--muted);margin:11px 0 0}
  .choice{display:flex;gap:8px;margin-top:11px}
  .choice button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:11px 8px;font-size:13px;font-weight:800;cursor:pointer;color:var(--ink)}
  .choice button.keep{background:var(--ok-soft);border-color:#CBE8D4;color:var(--ok)}
  .choice button.keep:hover{background:#DCF0E3}
  .choice button.change:hover{border-color:var(--accent);color:var(--accent-deep)}
  .choice button.change.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-deep)}

  /* 캐러셀 — 기본 비활성(희미), '바꿀래요' 후 활성 */
  .caro{position:relative;margin-top:13px}
  .caro .hint{font-size:11.5px;color:var(--muted);margin-bottom:8px}
  .caro .hint b{color:var(--accent-deep)}
  .caro .track{display:flex;gap:11px;overflow-x:auto;scroll-snap-type:x mandatory;padding:2px 2px 9px}
  .extile{position:relative;flex:0 0 46%;scroll-snap-align:center;border:2px solid var(--line);border-radius:11px;overflow:hidden;background:#fff;cursor:pointer;text-align:center;transition:.12s}
  .extile img{display:block;width:100%;filter:saturate(.9)}
  .extile .lb{display:block;font-size:12px;font-weight:700;padding:5px 2px;color:var(--muted)}
  .extile .extag{position:absolute;left:4px;top:4px;font-size:8.5px;font-weight:800;color:var(--faint);background:rgba(255,255,255,.9);border:1px dashed var(--faint);border-radius:4px;padding:0 4px;z-index:2}
  .extile:hover{transform:translateY(-2px);border-color:#A9C6DC}
  .caro.locked .extile{opacity:.32;pointer-events:none;filter:grayscale(.5)}
  .caro.locked .hint{opacity:.55}
  .caro .nav{position:absolute;top:40%;width:32px;height:32px;border-radius:50%;border:none;background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.16);cursor:pointer;font-size:15px;font-weight:800;color:var(--ink);z-index:3}
  .caro.locked .nav{opacity:.35;pointer-events:none}
  .caro .nav.l{left:-5px} .caro .nav.r{right:-5px}

  /* CTA 블록 — 마지막에 자연스럽게 */
  .ctabox{margin-top:4px;background:linear-gradient(180deg,#FFFFFF,#F2F8FD);border:1.5px solid var(--line);border-radius:14px;padding:16px;text-align:center;transition:opacity .2s}
  .ctabox.future{opacity:.45;pointer-events:none}
  .ctabox .msg{font-size:13px;color:var(--muted);margin:0 0 11px} .ctabox .msg b{color:var(--ink)}
  .cta{border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:14.5px;font-weight:800;padding:13px 30px;cursor:pointer;width:100%}
  .cta:hover{background:var(--accent-deep)}
  .sub-actions{display:flex;justify-content:center;gap:14px;margin-top:10px}
  .sub-actions button{border:none;background:none;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  .sub-actions button:hover{color:var(--accent-deep)}
  .matchbox{margin-top:12px;text-align:left;display:none}
  .matchbox.open{display:block}
</style>

<div class="wrap">
  <header>
    <h1>마네킹컷 확인</h1>
    <p>왼쪽이 AI가 만든 내 옷 컷이에요 · 괜찮으면 그대로, 다르면 바꿔주세요 (수정 무료)</p>
  </header>
  <div class="stage">
    <div class="mine">
      <span class="tag">🧍 내 옷 · AI 생성</span>
      <div class="mine-img"><img id="mine" alt="내 마네킹컷"></div>
      <div class="refrow"><img id="ref" alt="원본"> 내가 올린 사진 · <b style="color:var(--ink)">&nbsp;차콜 반팔 티셔츠</b></div>
    </div>
    <div class="flow" id="flow"></div>
  </div>
</div>

  };
  const FIT = [
    {id:'tight',lb:'타이트',img:'w_tight'},{id:'slim',lb:'슬림',img:'top_slim'},
    {id:'reg',lb:'레귤러',img:'top_base'},{id:'semi',lb:'세미오버',img:'top_loose'},{id:'over',lb:'오버',img:'top_over'}];
  const LEN = [
    {id:'ucrop',lb:'울트라크롭',img:'w_ultracrop'},{id:'crop',lb:'크롭',img:'top_crop'},
    {id:'basic',lb:'기본',img:'top_base'},{id:'long',lb:'롱',img:'top_long'}];
  const PCUT = [
    {id:'skinny',lb:'스키니',img:'w_cut_skinny'},{id:'slim',lb:'슬림',img:'bot_slim'},
    {id:'straight',lb:'일자',img:'bot_base'},{id:'boot',lb:'부츠컷',img:'w_cut_boot'},{id:'wide',lb:'와이드',img:'w_cut_wide'}];

  const AXES = [
    {key:'fit', name:'핏', q:'왼쪽 컷의 핏(여유감), 이대로 괜찮나요?', items:FIT},
    {key:'len', name:'기장', q:'기장(밑단 위치)은 어때요?', items:LEN},
  ];
  // 상태: pending → (keep|changing→picked)
  const st = {}; AXES.forEach(a=>st[a.key]={mode:'pending', pick:null});
  let matchPick = null, matchOpen = false;

  document.getElementById('mine').src = IMG.layer_slim_basic;
  document.getElementById('ref').src = IMG.ref_flat;

  const caro = (key, items, locked, hint) => `
    <div class="caro ${locked?'locked':''}" data-caro="${key}">
      <div class="hint">${hint}</div>
      <button class="nav l" data-d="-1">‹</button>
      <div class="track">${items.map(it=>`
        <div class="extile" data-ax="${key}" data-id="${it.id}" data-lb="${it.lb}">
          <span class="extag">예시</span><img src="${IMG[it.img]}"><span class="lb">${it.lb}</span>
        </div>`).join('')}</div>
      <button class="nav r" data-d="1">›</button>
    </div>`;

  function render(){
    const doneCount = AXES.filter(a=>['keep','picked'].includes(st[a.key].mode)).length;
    const allDone = doneCount === AXES.length;
    const changed = AXES.filter(a=>st[a.key].mode==='picked');
    const activeIdx = AXES.findIndex(a=>!['keep','picked'].includes(st[a.key].mode));

    document.getElementById('flow').innerHTML = AXES.map((a,i)=>{
      const s=st[a.key];
      const done=['keep','picked'].includes(s.mode);
      const active=i===activeIdx;
      if(done) return `
        <div class="card done">
          <div class="hd"><div class="num">✓</div><div class="ttl">${a.name}</div>
            <div class="st">${s.mode==='keep'?'그대로 두기':`<b>${s.pickLb}</b>(으)로 변경`}</div>
            <button class="editbtn" data-edit="${a.key}">수정</button></div>
        </div>`;
      const locked = s.mode!=='changing';
      return `
        <div class="card ${active?'active':'future'}">
          <div class="hd"><div class="num">${i+1}</div><div class="ttl">${a.name}</div></div>
          ${active||s.mode==='changing'?`
            <p class="q">${a.q}</p>
            <div class="choice">
              <button class="keep" data-keep="${a.key}">괜찮아요, 그대로 →</button>
              <button class="change ${s.mode==='changing'?'on':''}" data-change="${a.key}">${a.name} 바꿀래요</button>
            </div>
            ${caro(a.key, a.items, locked,
              locked?`바꾸려면 위의 '${a.name} 바꿀래요'를 먼저 눌러주세요`
                    :`내 옷과 가장 비슷한 <b>예시</b>를 고르세요 (예시는 참고용 이미지예요)`)}`:''}
        </div>`;
    }).join('') + `
      <div class="ctabox ${allDone?'':'future'}">
        <p class="msg">${!allDone?'위 항목을 확인하면 넘어갈 수 있어요':
          changed.length?`<b>${changed.map(a=>a.name).join('·')}</b>을(를) 바꿨어요 — 다시 생성해서 확인해요`:
          '핏이 모두 괜찮대요! 다음 단계로 넘어가요'}</p>
        <button class="cta">${changed.length?'다시 생성하고 계속 · 1 크레딧':'좋아요, 다음 단계로 →'}</button>
        <div class="sub-actions">
          <button data-mtoggle>매칭 의류(하의)도 수정하기</button>
        </div>
        <div class="matchbox ${matchOpen?'open':''}">
          ${matchPick?`<div class="card done" style="box-shadow:none"><div class="hd"><div class="num">✓</div>
            <div class="ttl">매칭 하의</div><div class="st"><b>${matchPick}</b>(으)로 변경</div>
            <button class="editbtn" data-medit>수정</button></div></div>`
          : caro('pcut', PCUT, false, `하의 <b>컷</b>을 예시에서 고르세요 (기본은 자동으로 맞춰져 있어요)`)}
        </div>
      </div>`;
  }

  document.getElementById('flow').addEventListener('click', e=>{
    const b=e.target.closest('button'); const tile=e.target.closest('.extile');
    if(tile){
      if(tile.dataset.ax==='pcut'){ matchPick=tile.dataset.lb; render(); return; }
      const k=tile.dataset.ax; st[k].mode='picked'; st[k].pick=tile.dataset.id; st[k].pickLb=tile.dataset.lb; render(); return;
    }
    if(!b) return;
    if(b.dataset.keep){ st[b.dataset.keep].mode='keep'; render(); }
    else if(b.dataset.change){ const k=b.dataset.change; st[k].mode = st[k].mode==='changing'?'pending':'changing'; render(); }
    else if(b.dataset.edit){ const k=b.dataset.edit; st[k].mode='changing'; st[k].pick=null; render(); }
    else if(b.dataset.mtoggle!==undefined){ matchOpen=!matchOpen; render(); }
    else if(b.dataset.medit!==undefined){ matchPick=null; matchOpen=true; render(); }
    else if(b.classList.contains('nav')){ const tr=b.closest('.caro').querySelector('.track');
      tr.scrollBy({left:+b.dataset.d*tr.clientWidth*.5, behavior:'smooth'}); }
  });
  render();
</script>
